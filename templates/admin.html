{% extends "base.html" %}

{% block title %}Admin Dashboard - SureJob{% endblock %}

{% block extra_css %}
<style>
    .admin-container {max-width:1400px; margin:40px auto; padding:0 5%;}
    .admin-header {
        background:linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        color:#fff; padding:40px; border-radius:16px; margin-bottom:32px;
        display:flex; justify-content:space-between; align-items:center;
    }
    .admin-header h1 {font-size:32px; font-weight:800; margin-bottom:8px;}
    .admin-header p {opacity:0.9;}
    
    .stats-grid {
        display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
        gap:20px; margin-bottom:40px;
    }
    .stat-card {
        background:var(--white); padding:28px; border-radius:16px;
        border:1px solid var(--border); position:relative; overflow:hidden;
    }
    .stat-card::before {
        content:''; position:absolute; top:0; left:0; width:4px; height:100%;
    }
    .stat-card.blue::before {background:var(--primary);}
    .stat-card.green::before {background:var(--success);}
    .stat-card.orange::before {background:#f59e0b;}
    .stat-card.red::before {background:#dc2626;}
    
    .stat-icon {
        width:48px; height:48px; border-radius:12px;
        display:flex; align-items:center; justify-content:center;
        font-size:24px; margin-bottom:16px;
    }
    .stat-card.blue .stat-icon {background:#dbeafe; color:var(--primary);}
    .stat-card.green .stat-icon {background:#dcfce7; color:var(--success);}
    .stat-card.orange .stat-icon {background:#fef3c7; color:#f59e0b;}
    .stat-card.red .stat-icon {background:#fee2e2; color:#dc2626;}
    
    .stat-value {font-size:36px; font-weight:800; margin-bottom:4px;}
    .stat-label {color:var(--text-light); font-size:14px; font-weight:500;}
    
    .chart-card {
        background:var(--white); padding:32px; border-radius:16px;
        border:1px solid var(--border); margin-bottom:32px;
    }
    .chart-card h3 {font-size:20px; font-weight:700; margin-bottom:24px;}
    
    .tabs {
        display:flex; gap:8px; border-bottom:2px solid var(--border);
        margin-bottom:24px;
    }
