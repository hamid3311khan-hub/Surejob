{% extends "base.html" %}
{% block title %}Candidate Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white"><h4 class="mb-0">Candidate Registration</h4></div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3"><label>Full Name</label><input type="text" name="name" class="form-control" required></div>
                        <div class="col-md-6 mb-3"><label>Email</label><input type="email" name="email" class="form-control" required></div>
                    </div>
                    <div class="mb-3"><label>Password</label><input type="password" name="password" class="form-control" required></div>
                    <hr><p class="text-muted">Profile Details - Optional</p>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label>Location</label><input type="text" name="location" class="form-control" placeholder="Delhi, Mumbai"></div>
                        <div class="col-md-6 mb-3"><label>Phone</label><input type="text" name="phone" class="form-control" placeholder="9876543210"></div>
                    </div>
                    <div class="mb-3"><label>Skills</label><input type="text" name="skills" class="form-control" placeholder="Python, React, Sales, Marketing"></div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label>Experience</label><input type="text" name="experience" class="form-control" placeholder="2 years, Fresher"></div>
                        <div class="col-md-6 mb-3"><label>Education</label><input type="text" name="education" class="form-control" placeholder="B.Tech, MBA, 12th"></div>
                    </div>
                    <div class="mb-3"><label>About Me</label><textarea name="about" class="form-control" rows="2" placeholder="Brief intro about yourself"></textarea></div>
                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>
                <hr>
                <p class="text-center mb-0">Already registered? <a href="{{ url_for('candidate_login') }}">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
