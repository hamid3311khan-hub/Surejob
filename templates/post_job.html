<!DOCTYPE html>
<html>
<head>
    <title>Post Job - Surejob</title>
</head>
<body>
    <h2>Post New Job</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <p style="color: green;">{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}
    
    <form method="POST">
        <input type="text" name="title" placeholder="Job Title" required><br><br>
        <textarea name="description" placeholder="Job Description"></textarea><br><br>
        <input type="text" name="salary" placeholder="Salary e.g. 3.75 LPA" required><br><br>
        <input type="text" name="location" placeholder="Location" required><br><br>
        <input type="text" name="category" placeholder="Category e.g. Sales" required><br><br>
        <button type="submit">Post Job</button>
    </form>
    
    <a href="/company-dashboard">Back to Dashboard</a>
</body>
</html>
