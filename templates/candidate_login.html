{% extends "base.html" %}
{% block title %}Candidate Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white"><h4 class="mb-0">Candidate Login</h4></div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3"><label>Email</label><input type="email" name="email" class="form-control" required></div>
                    <div class="mb-3"><label>Password</label><input type="password" name="password" class="form-control" required></div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <hr>
                <p class="text-center mb-0">New here? <a href="{{ url_for('candidate_register') }}">Register</a></p>
                <p class="text-center mb-0">Company? <a href="{{ url_for('company_login') }}">Company Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
