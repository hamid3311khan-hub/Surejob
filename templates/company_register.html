{% extends "base.html" %}
{% block title %}Company Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white"><h4 class="mb-0">Company Registration</h4></div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3"><label>Company Name</label><input type="text" name="name" class="form-control" required></div>
                    <div class="mb-3"><label>Company Email</label><input type="email" name="email" class="form-control" required></div>
                    <div class="mb-3"><label>Password</label><input type="password" name="password" class="form-control" required></div>
                    <div class="mb-3"><label>Location</label><input type="text" name="location" class="form-control" placeholder="Delhi, Mumbai, Bangalore"></div>
                    <div class="mb-3"><label>Phone</label><input type="text" name="phone" class="form-control" placeholder="9876543210"></div>
                    <div class="mb-3"><label>About Company</label><textarea name="about" class="form-control" rows="3" placeholder="What does your company do?"></textarea></div>
                    <button type="submit" class="btn btn-success w-100">Register Company</button>
                </form>
                <hr>
                <p class="text-center mb-0">Already registered? <a href="{{ url_for('company_login') }}">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
