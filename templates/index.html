{% extends "base.html" %}
{% block content %}
<div class="bg-light p-5 rounded text-center mb-4">
    <h1>Find Your Dream Job</h1>
    <p>Thousands of jobs waiting for you</p>
    <a href="{{ url_for('jobs') }}" class="btn btn-primary">Browse Jobs</a>
</div>
<h2>Latest Jobs</h2>
<div class="row">
    {% for job in jobs %}
    <div class="col-md-4 mb-3">
        <div class="card">
            <div class="card-body">
                <h5>{{ job.title }}</h5>
                <p class="text-muted">{{ job.company_name }} - {{ job.location }}</p>
                <a href="{{ url_for('job_detail', job_id=job.id) }}" class="btn btn-primary btn-sm">View</a>
            </div>
        </div>
    </div>
    {% else %}
    <p>No jobs posted yet.</p>
    {% endfor %}
</div>
{% endblock %}
