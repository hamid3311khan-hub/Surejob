{% extends "base.html" %}
{% block title %}Company Profile{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white"><h4 class="mb-0">Company Profile</h4></div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3"><label>Company Name</label><input type="text" name="name" class="form-control" value="{{ user.name }}" required></div>
                    <div class="mb-3"><label>Email</label><input type="email" class="form-control" value="{{ user.email }}" disabled></div>
                    <div class="mb-3"><label>Location</label><input type="text" name="location" class="form-control" value="{{ user.location or '' }}" placeholder="Delhi, Mumbai, Remote"></div>
                    <div class="mb-3"><label>Phone</label><input type="text" name="phone" class="form-control" value="{{ user.phone or '' }}" placeholder="9876543210"></div>
                    <div class="mb-3"><label>About Company</label><textarea name="about" class="form-control" rows="4" placeholder="Describe your company, culture, what you do">{{ user.about or '' }}</textarea></div>
                    <button type="submit" class="btn btn-success w-100">Update Profile</button>
                </form>
                <hr>
                <a href="{{ url_for('column.company_dashboard') }}" class="btn btn-secondary w-100">Back to Dashboard</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
