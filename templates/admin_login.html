{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-danger text-white"><h4 class="mb-0">Admin Login</h4></div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3"><label>Admin Email</label><input type="email" name="email" class="form-control" required></div>
                    <div class="mb-3"><label>Password</label><input type="password" name="password" class="form-control" required></div>
                    <button type="submit" class="btn btn-danger w-100">Login</button>
                </form>
                <p class="text-center mt-3 text-muted small">Default: admin@surejob.com / admin123</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
