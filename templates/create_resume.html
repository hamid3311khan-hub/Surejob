{% extends "base.html" %}
{% block title %}Update Resume{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white"><h4 class="mb-0">Update Your Resume</h4></div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3"><label>Location</label><input type="text" name="location" class="form-control" value="{{ user.location or '' }}" placeholder="Delhi, Mumbai"></div>
                        <div class="col-md-6 mb-3"><label>Phone</label><input type="text" name="phone" class="form-control" value="{{ user.phone or '' }}" placeholder="9876543210"></div>
                    </div>
                    <div class="mb-3"><label>Skills</label><input type="text" name="skills" class="form-control" value="{{ user.skills or '' }}" placeholder="Python, React, Sales, Marketing, Excel"></div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label>Experience</label><input type="text" name="experience" class="form-control" value="{{ user.experience or '' }}" placeholder="2 years, Fresher, 5+ years"></div>
                        <div class="col-md-6 mb-3"><label>Education</label><input type="text" name="education" class="form-control" value="{{ user.education or '' }}" placeholder="B.Tech, MBA, 12th, B.Com"></div>
                    </div>
                    <div class="mb-3"><label>About Me / Summary</label><textarea name="about" class="form-control" rows="4" placeholder="Tell companies about yourself, your achievements, career goals">{{ user.about or '' }}</textarea></div>
                    <button type="submit" class="btn btn-primary w-100">Save Resume</button>
                </form>
                <hr>
                <a href="{{ url_for('column.candidate_dashboard') }}" class="btn btn-secondary w-100">Back to Dashboard</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
