{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h3><i class="fas fa-edit"></i> Edit Job</h3>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    
    <form method="POST">
        <div class="mb-3">
            <label>Job Title</label>
            <input type="text" name="title" class="form-control" value="{{ job.title }}" required>
        </div>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Location</label>
                <select name="location" class="form-control" required>
                    {% for loc in locations %}
                    <option value="{{ loc }}" {% if job.location == loc %}selected{% endif %}>{{ loc }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label>Category</label>
                <select name="category" class="form-control" required>
                    {% for cat in categories %}
                    <option value="{{ cat }}" {% if job.category == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Salary</label>
                <input type="text" name="salary" class="form-control" value="{{ job.salary }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Experience</label>
                <input type="text" name="experience" class="form-control" value="{{ job.experience }}">
            </div>
        </div>
        
        <div class="mb-3">
            <label>Skills</label>
            <input type="text" name="skills" class="form-control" value="{{ job.skills }}">
        </div>
        
        <div class="mb-3">
            <label>Contact</label>
            <input type="text" name="contact" class="form-control" value="{{ job.contact }}">
        </div>
        
        <div class="mb-3">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="5">{{ job.description }}</textarea>
        </div>
        
        <button type="submit" class="btn btn-success">Update Job</button>
        <a href="/company-dashboard" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
