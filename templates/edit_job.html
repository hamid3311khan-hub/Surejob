{% extends "base.html" %}
{% block title %}Edit Job{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-warning"><h4 class="mb-0">Edit Job: {{ job.title }}</h4></div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('job.edit_job', job_id=job.id) }}">
                    <div class="mb-3"><label>Job Title</label><input type="text" name="title" class="form-control" value="{{ job.title }}" required></div>
                    <div class="mb-3"><label>Job Description</label><textarea name="description" class="form-control" rows="5" required>{{ job.description }}</textarea></div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label>Location</label><input type="text" name="location" class="form-control" value="{{ job.location }}" required></div>
                        <div class="col-md-6 mb-3"><label>Salary</label><input type="text" name="salary" class="form-control" value="{{ job.salary }}" required></div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Job Type</label>
                            <select name="job_type" class="form-select" required>
                                <option value="Full-time" {% if job.job_type=='Full-time' %}selected{% endif %}>Full-time</option>
                                <option value="Part-time" {% if job.job_type=='Part-time' %}selected{% endif %}>Part-time</option>
                                <option value="Contract" {% if job.job_type=='Contract' %}selected{% endif %}>Contract</option>
                                <option value="Remote" {% if job.job_type=='Remote' %}selected{% endif %}>Remote</option>
                                <option value="Internship" {% if job.job_type=='Internship' %}selected{% endif %}>Internship</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3"><label>Experience Required</label><input type="text" name="experience_required" class="form-control" value="{{ job.experience_required }}" placeholder="2-5 years, Fresher"></div>
                    </div>
                    <div class="mb-3"><label>Skills Required</label><input type="text" name="skills_required" class="form-control" value="{{ job.skills_required }}" placeholder="Python, Django, React"></div>
                    <button type="submit" class="btn btn-warning w-100">Update Job</button>
                </form>
                <hr>
                <a href="{{ url_for('column.company_dashboard') }}" class="btn btn-secondary w-100">Cancel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
