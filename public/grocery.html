<!DOCTYPE html>
<html>
<head>
  <title>Grocery - Phatakcart</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
   .nav { margin-bottom: 20px; }
   .nav a { margin-right: 15px; text-decoration: none; color: #333; font-weight: bold; }
   .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
   .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
   .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
   .price { color: #ff6f00; font-weight: bold; font-size: 18px; }
   .offer { color: green; font-size: 14px; }
   .desc { font-size: 12px; color: #666; margin: 5px 0; }
    button { background: #ff6f00; color: white; border: none; padding: 10px; cursor: pointer; width: 100%; border-radius: 5px; margin-top: 10px; }
    button:hover { background: #e65100; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">Home</a> | <a href="/food">Food</a> | <a href="/dress">Dress</a> | <a href="/grocery">Grocery</a> | <a href="/cart">Cart</a> | <a href="/vendor">Vendor</a>
  </div>
  <h1>🛒 Grocery Items</h1>
  <div class="grid" id="products">Loading...</div>

<script>
async function loadProducts() {
  const res = await fetch('/api/products?cat=3')
  const products = await res.json()
  const container = document.getElementById('products')
  
  if (products.length === 0) {
    container.innerHTML = '<p>Koi grocery item nahi mila</p>'
    return
  }
  
  container.innerHTML = products.map(p => `
    <div class="card">
      <img src="${p.image_url}" alt="${p.name}">
      <h3>${p.name}</h3>
      <p class="desc">${p.description || ''}</p>
      <p class="price">₹${p.offer_price || p.price}</p>
      ${p.offer_price ? `<p class="offer">OFFER: ₹${p.price - p.offer_price} OFF</p>` : ''}
      <button onclick="addToCart(${p.id})">Add to Cart</button>
    </div>
  `).join('')
}

async function addToCart(id) {
  const res = await fetch('/api/cart', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ productId: id, qty: 1 })
  })
  const data = await res.json()
  alert(data.message || 'Cart mein add ho gaya')
}

loadProducts()
</script>
</body>
</html>
