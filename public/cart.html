<!DOCTYPE html>
<html>
<head>
  <title>Cart - Phatakcart</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .item { border: 1px solid #ddd; padding: 10px; margin: 10px 0; position: relative; }
    .remove-btn { background: red; color: white; border: none; padding: 5px 10px; cursor: pointer; position: absolute; right: 10px; top: 10px; }
  </style>
</head>
<body>
  <h1>🛒 Your Cart</h1>
  <div id="cart-items">Cart load ho raha hai...</div>
  <h3 id="total"></h3>

<script>
async function loadCart() {
  try {
    const res = await fetch('/api/cart')
    const cart = await res.json()
    
    let html = ''
    let total = 0
    
    if (cart.length === 0) {
      html = '<p>Cart khali hai baba. Food page se kuch add kar.</p>'
    } else {
      cart.forEach(item => {
        const itemTotal = item.price * item.qty
        total += itemTotal
        html += `
          <div class="item">
            <b>${item.name}</b><br>
            ₹${item.price} x ${item.qty} = ₹${itemTotal}
            <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
          </div>
        `
      })
    }
    
    document.getElementById('cart-items').innerHTML = html
    document.getElementById('total').innerText = cart.length > 0 ? 'Total: ₹' + total : ''
    
  } catch (err) {
    document.getElementById('cart-items').innerHTML = 'Error: ' + err.message
  }
}

// REMOVE FUNCTION
async function removeItem(id) {
  if (!confirm('Hata de ye item?')) return
  
  try {
    await fetch(`/api/cart/${id}`, { method: 'DELETE' })
    loadCart() // Cart refresh kar de
  } catch (err) {
    alert('Remove nahi hua. Phir try kar.')
  }
}

loadCart()
</script>
</body>
</html>
