<!DOCTYPE html>
<html>
<head>
  <title>Cart - Phatakcart</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
   .nav { margin-bottom: 20px; }
   .nav a { margin-right: 15px; text-decoration: none; color: #333; font-weight: bold; }
   .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
   .item { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 1px solid #eee; }
   .item img { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; }
   .item-info { flex: 1; }
   .price { color: #ff6f00; font-weight: bold; }
   .total { font-size: 24px; font-weight: bold; text-align: right; margin: 20px 0; color: #ff6f00; }
   .order-btn { background: #00c853; color: white; border: none; padding: 15px; cursor: pointer; width: 100%; border-radius: 5px; font-size: 18px; }
   .order-btn:hover { background: #00a043; }
   .remove { background: #ff4444; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">Home</a> | <a href="/food">Food</a> | <a href="/dress">Dress</a> | <a href="/grocery">Grocery</a> | <a href="/cart">Cart</a> | <a href="/vendor">Vendor</a>
  </div>
  
  <div class="container">
    <h1>🛒 Your Cart</h1>
    <div id="cartItems">Loading...</div>
    <div class="total" id="cartTotal"></div>
    <button class="order-btn" id="orderBtn" onclick="goToOrder()" style="display:none;">Order Now →</button>
  </div>

<script>
async function loadCart() {
  const res = await fetch('/api/cart')
  const items = await res.json()
  const container = document.getElementById('cartItems')
  const orderBtn = document.getElementById('orderBtn')
  
  if (items.length === 0) {
    container.innerHTML = '<p style="text-align:center; padding:40px;">Cart khali hai. <a href="/food">Food order kar</a></p>'
    document.getElementById('cartTotal').innerText = ''
    orderBtn.style.display = 'none'
    return
  }
  
  let total = 0
  container.innerHTML = items.map(item => {
    const price = item.offer_price || item.price
    const itemTotal = price * item.qty
    total += itemTotal
    return `
      <div class="item">
        <img src="${item.image_url}" alt="${item.name}">
        <div class="item-info">
          <h3>${item.name}</h3>
          <p class="price">₹${price} x ${item.qty} = ₹${itemTotal}</p>
        </div>
        <button class="remove" onclick="removeItem(${item.id})">Remove</button>
      </div>
    `
  }).join('')
  
  document.getElementById('cartTotal').innerText = `Total: ₹${total}`
  orderBtn.style.display = 'block'
}

async function removeItem(id) {
  await fetch(`/api/cart/${id}`, { method: 'DELETE' })
  loadCart()
}

function goToOrder() {
  window.location.href = '/order'
}

loadCart()
</script>
</body>
</html>
