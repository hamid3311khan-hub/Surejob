<!DOCTYPE html>
<html>
<head>
    <title>Phatakcart - Andheri Delivery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; margin: 0; background: #f5f5f5; }
       .header { background: #ff6b00; color: white; padding: 15px; text-align: center; font-size: 24px; font-weight: bold; }
       .cats { display: flex; justify-content: space-around; padding: 15px; }
       .cat-btn { background: white; border: 2px solid #ff6b00; padding: 15px; border-radius: 10px; font-size: 18px; cursor: pointer; }
       .cat-btn.active { background: #ff6b00; color: white; }
       .products { padding: 15px; }
       .item { background: white; margin: 10px 0; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; }
       .coming { text-align: center; padding: 50px; font-size: 20px; color: #666; }
    </style>
</head>
<body>
    <div class="header">PHATAKCART 🚚<br><small>Food, Dress & Grocery</small></div>
    
    <div class="cats">
        <button class="cat-btn active" onclick="showCat(1)">🍗 Food</button>
        <button class="cat-btn" onclick="showCat(2)">👗 Dress</button>
        <button class="cat-btn" onclick="showCat(3)">🛒 Grocery</button>
    </div>

    <div id="products" class="products"></div>

<script>
async function showCat(catId) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    
    if(catId == 1) {
        const res = await fetch('/api/products?cat=1');
        const data = await res.json();
        document.getElementById('products').innerHTML = data.map(p => `
            <div class="item">
                <div><b>${p.name}</b><br>₹${p.price}</div>
                <button onclick="order(${p.id})">Add</button>
            </div>
        `).join('');
    } else {
        document.getElementById('products').innerHTML = '<div class="coming">Coming Soon 🔥<br>Pehle Biryani order karo</div>';
    }
}
function order(id) { alert('Order system next step mein banayenge. Pehle DB setup karo'); }
showCat(1);
</script>
</body>
</html>
