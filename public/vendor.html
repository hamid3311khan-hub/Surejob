<!DOCTYPE html>
<html>
<head>
  <title>Vendor Dashboard - Phatakcart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background: #f5f5f5; margin: 0; padding: 20px; }
.header { background: #ff6f00; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
.box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    button { background: #00c853; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    button:disabled { background: #ccc; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
.modal-content { background: white; padding: 30px; border-radius: 15px; max-width: 500px; width: 90%; }
.file-input { border: 2px dashed #ff6f00; background: #fff9f0; padding: 10px; margin: 8px 0; }
  </style>
</head>
<body>
  <div id="loginBox" class="box">
    <h2>Vendor Login</h2>
    <input type="text" id="phone" placeholder="Phone Number">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p style="text-align:center; margin-top:15px;">New ho? <a href="/register">Register karo</a></p>
  </div>

  <div id="dashboard" style="display:none;">
    <div class="header">
      <h1>Welcome, <span id="shopName"></span></h1>
      <p id="status"></p>
    </div>

    <div class="box">
      <h2>Products</h2>
      <button onclick="openModal()">+ Add New Product</button>
      <div id="productList" style="margin-top:20px;"></div>
    </div>
  </div>

  <!-- Add Product Modal -->
  <div id="productModal" class="modal">
    <div class="modal-content">
      <h2>Add Product</h2>
      <input type="text" id="pname" placeholder="Product Name *" required>
      <input type="number" id="pprice" placeholder="Price ₹ *" required>
      <input type="number" id="pstock" placeholder="Stock Quantity *" required>
      <div class="file-input">
        <label>Product Image * (Max 5MB)</label>
        <input type="file" id="pimage" accept=".jpg,.jpeg,.png" required>
      </div>
      <button id="addBtn" onclick="addProduct()">Save Product</button>
      <button onclick="closeModal()" style="background:#999; margin-top:10px;">Cancel</button>
    </div>
  </div>

<script>
let vendorData = null;

async function login() {
  const phone = document.getElementById('phone').value;
  const password = document.getElementById('password').value;

  // Ye API tu baad mein banayega. Abhi dummy
  alert('Login API baad mein banayenge. Abhi testing ke liye direct dashboard dikha raha hun');

  vendorData = { id: 1, shop_name: 'Test Shop', active: true, kyc_status: 'approved' };
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('shopName').innerText = vendorData.shop_name;
  document.getElementById('status').innerText = vendorData.active? '✅ Active' : '⏳ Pending Approval';
}

function openModal() {
  if (!vendorData.active) {
    alert('Admin approval ke baad hi product add kar sakte ho');
    return;
  }
  document.getElementById('productModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('productModal').style.display = 'none';
}

async function addProduct() {
  const btn = document.getElementById('addBtn');
  const name = document.getElementById('pname').value;
  const price = document.getElementById('pprice').value;
  const stock = document.getElementById('pstock').value;
  const image = document.getElementById('pimage').files[0];

  if (!name ||!price ||!stock ||!image) {
    alert('Saare fields bharo');
    return;
  }

  btn.disabled = true;
  btn.innerText = 'Uploading...';

  const formData = new FormData();
  formData.append('vendorId', vendorData.id);
  formData.append('name', name);
  formData.append('price', price);
  formData.append('stock', stock);
  formData.append('image', image);

  const res = await fetch('/api/add-product', { method: 'POST', body: formData });
  const data = await res.json();

  if (data.success) {
    alert('Product added!');
    closeModal();
    document.getElementById('pname').value = '';
    document.getElementById('pprice').value = '';
    document.getElementById('pstock').value = '';
    document.getElementById('pimage').value = '';
  } else {
    alert('Error: ' + data.message);
  }

  btn.disabled = false;
  btn.innerText = 'Save Product';
}
</script>
</body>
</html>
