<!DOCTYPE html>
<html>
<head>
  <title>Phatakcart - Food</title>
  <style>
    body { font-family: Arial; padding: 20px; }
   .product { border: 1px solid #ddd; padding: 15px; margin: 10px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Food Items</h1>
  <div id="products">Loading...</div>

  <script>
    fetch('/api/products?category=1')
     .then(res => res.json())
     .then(data => {
        const container = document.getElementById('products');
        if (data.length === 0) {
          container.innerHTML = 'No products found';
          return;
        }
        container.innerHTML = data.map(p => `
          <div class="product">
            <h3>${p.name}</h3>
            <p>Price: ₹${p.price}</p>
          </div>
        `).join('');
      })
     .catch(err => {
        document.getElementById('products').innerHTML = 'Error loading products';
        console.error(err);
      });
  </script>
</body>
</html>
